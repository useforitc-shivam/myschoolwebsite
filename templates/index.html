<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>EduMaster</title>

  <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

  <!-- NAVBAR -->

  <nav>

    <div class="logo">
      EduMaster
    </div>

    <ul class="menu">

      <li><a href="#">Home</a></li>

      <li><a href="#courses">Courses</a></li>

      <li><a href="#contact">Contact</a></li>

    </ul>

  </nav>

  <!-- HERO -->

  <section class="hero">

    <div class="content">

      <h1>
        Learn Skills Online
      </h1>

      <p>
        Build your future with online education.
      </p>

      <button>
        Start Learning
      </button>

    </div>

  </section>

  <!-- SEARCH -->

  <div class="search-box">

    <form action="/search"
          method="GET">

      <input type="text"
             name="query"
             placeholder="Search Course">

      <button type="submit">
        Search
      </button>

    </form>

  </div>

  <!-- COURSES -->

  <section class="courses"
           id="courses">

    <div class="card">

      <h2>HTML & CSS</h2>

      <p>
        Learn Website Designing
      </p>

    </div>

    <div class="card">

      <h2>Python</h2>

      <p>
        Learn Backend Development
      </p>

    </div>

    <div class="card">

      <h2>JavaScript</h2>

      <p>
        Learn Interactive Websites
      </p>

    </div>

  </section>

  <!-- CONTACT -->

  <section class="contact"
           id="contact">

    <h2>
      Contact Us
    </h2>

    <form action="/contact"
          method="POST">

      <input type="text"
             name="name"
             placeholder="Enter Name"
             required>

      <input type="email"
             name="email"
             placeholder="Enter Email"
             required>

      <textarea name="message"
                rows="5"
                placeholder="Enter Message"></textarea>

      <button type="submit">
        Send Message
      </button>

    </form>

  </section>

</body>
</html>
